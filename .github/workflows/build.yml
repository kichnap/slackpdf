name: CI

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master]

jobs:
  build-and-test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test
        run: dotnet test --no-build --configuration Release --collect:"XPlat Code Coverage"

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          fail_ci_if_error: false

  build-installer:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.x'

      - name: Publish main app
        run: dotnet publish src/SlackPDF/SlackPDF.csproj -c Release -o publish/

      - name: Publish PrintService
        run: dotnet publish src/SlackPDF.PrintService/SlackPDF.PrintService.csproj -c Release -o publish/service/

      - name: Publish PrinterUI
        run: dotnet publish src/SlackPDF.PrinterUI/SlackPDF.PrinterUI.csproj -c Release -o publish/printerui/

      - name: Publish PrinterInstaller
        run: dotnet publish src/SlackPDF.PrinterInstaller/SlackPDF.PrinterInstaller.csproj -c Release -o publish/installer/

      - name: Install Inno Setup
        run: choco install innosetup --yes --no-progress

      - name: Build Inno Setup Installer
        run: '& "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer\SlackPDF.iss'

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: SlackPDF-installer
          path: installer/Output/SlackPDF-Setup-*.exe

  build-clawmon:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup MSVC
        uses: microsoft/setup-msbuild@v2

      - name: Build clawmon.dll
        run: |
          msbuild src/clawmon/clawmon.vcxproj `
            /p:Configuration=Release `
            /p:Platform=x64

      - name: Upload clawmon artifact
        uses: actions/upload-artifact@v4
        with:
          name: clawmon-dll
          path: bin/clawmon.dll
