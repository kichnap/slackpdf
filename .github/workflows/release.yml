name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build-installer:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.x'

      - name: Publish main app
        run: dotnet publish src/SlackPDF/SlackPDF.csproj -c Release -o publish/

      - name: Publish PrintService
        run: dotnet publish src/SlackPDF.PrintService/SlackPDF.PrintService.csproj -c Release -o publish/service/

      - name: Publish PrinterUI
        run: dotnet publish src/SlackPDF.PrinterUI/SlackPDF.PrinterUI.csproj -c Release -o publish/printerui/

      - name: Publish PrinterInstaller
        run: dotnet publish src/SlackPDF.PrinterInstaller/SlackPDF.PrinterInstaller.csproj -c Release -o publish/installer/

      - name: Extract version (strip leading v)
        shell: pwsh
        run: |
          $ver = "${{ github.ref_name }}" -replace '^v', ''
          "VERSION=$ver" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Build Inno Setup installer
        uses: Minionguyjpro/Inno-Setup-Action@v1.2.4
        with:
          path: installer/SlackPDF.iss
          options: /DAppVersion=${{ env.VERSION }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: installer/Output/SlackPDF-Setup-*.exe
          generate_release_notes: true
